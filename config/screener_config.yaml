presets:

  quality_compounder:
    filters:
      return_on_equity_pct:
        min: 15
      debt_to_equity:
        max: 1.0
      free_cash_flow_cr:
        min: 0
      revenue_cagr_5yr:
        min: 10

  value_pick:
    filters:
      pe_ratio:
        max: 30
      pb_ratio:
        max: 5
      debt_to_equity:
        max: 2
      dividend_yield_pct:
        min: 0.5

  growth_accelerator:
    filters:
      pat_cagr_5yr:
        min: 20
      revenue_cagr_5yr:
        min: 15
      debt_to_equity:
        max: 2.0

  dividend_champion:
    filters:
      dividend_yield_pct:
        min: 2
      dividend_payout_ratio_pct:
        max: 80
      free_cash_flow_cr:
        min: 0

  debt_free_blue_chip:
    filters:
      debt_to_equity:
        max: 0
      return_on_equity_pct:
        min: 12
      sales:
        min: 5000

  turnaround_watch:
    filters:
      revenue_cagr_5yr:
        min: 10
      free_cash_flow_cr:
        min: 0